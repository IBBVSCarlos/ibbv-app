<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stories - Mídia IBBV</title>
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <header>
    <h1 style="text-align: center; margin-top: 1.5rem;">🎬 Mídias para Stories e Divulgação</h1>
  </header>

  <main class="container" style="padding: 1rem 2rem;">
    <section class="section-box">
      <p>Selecione o conteúdo abaixo para visualizar ou baixar. Compartilhe com os irmãos nas redes sociais para divulgar o que Deus tem feito na nossa igreja 🙌</p>
      
      <div class="avisos-lista">

        <!-- ITEM DE MÍDIA -->
        <div class="aviso-item">
          <img src="assets/midias/story_exemplo.jpg" alt="Mídia exemplo" class="midia-thumbnail" onclick="abrirModal('assets/midias/story_exemplo.jpg')">
          <div class="aviso-botoes">
            <a href="assets/midias/story_exemplo.jpg" class="btn-aviso" download>
              <i class="fa-solid fa-download"></i> Baixar Imagem
            </a>
          </div>
        </div>

        <!-- ITEM DE VÍDEO -->
        <div class="aviso-item">
          <video width="100%" controls>
            <source src="assets/midias/video_exemplo.mp4" type="video/mp4">
            Seu navegador não suporta reprodução de vídeo.
          </video>
          <div class="aviso-botoes">
            <a href="assets/midias/video_exemplo.mp4" class="btn-aviso" download>
              <i class="fa-solid fa-download"></i> Baixar Vídeo
            </a>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- Modal para imagem ampliada -->
  <div class="imagem-modal" id="imagemModal" style="display: none;">
    <div class="imagem-modal-conteudo">
      <span class="imagem-modal-fechar" onclick="fecharModal()">&times;</span>
      <img id="imagemModalConteudo" src="" alt="Visualização de Mídia">
    </div>
  </div>

  <script>
    function abrirModal(src) {
      const modal = document.getElementById('imagemModal');
      const img = document.getElementById('imagemModalConteudo');
      img.src = src;
      modal.style.display = 'flex';
    }

    function fecharModal() {
      document.getElementById('imagemModal').style.display = 'none';
    }
  </script>
</body>
</html>
